        <title>АРТУРЧИК box - Футбольный бокс</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
                min-height: 100vh;
                padding: 20px;
                background: linear-gradient(135deg, #0a0a0a 0%, #1a2a1a 25%, #0d2f1a 50%, #0a0a0a 75%, #1a3a1a 100%);
                background-size: 200% 200%;
                animation: gradientMove 8s ease infinite;
            }

            @keyframes gradientMove {
                0% { background-position: 0% 0%; }
                25% { background-position: 50% 50%; }
                50% { background-position: 100% 100%; }
                75% { background-position: 50% 50%; }
                100% { background-position: 0% 0%; }
            }

            .cart-icon {
                position: fixed;
                top: 20px;
                right: 20px;
                background: rgba(0,0,0,0.8);
                backdrop-filter: blur(10px);
                padding: 12px 18px;
                border-radius: 50px;
                cursor: pointer;
                box-shadow: 0 5px 20px rgba(0,0,0,0.3);
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 20px;
                z-index: 100;
                transition: all 0.3s ease;
                border: 1px solid rgba(45,140,78,0.3);
            }

            .cart-icon:hover {
                transform: scale(1.05);
                background: rgba(0,0,0,0.95);
            }

            .cart-count {
                background: #ff4444;
                color: white;
                border-radius: 50%;
                width: 24px;
                height: 24px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
                font-weight: bold;
            }

            .product-card {
                max-width: 750px;
                margin: 80px auto 0;
                background: transparent;
                border-radius: 0;
                padding: 35px;
                text-align: center;
                animation: fadeInUp 0.6s ease;
            }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            /* СЛАЙДЕР - ИСПРАВЛЕННАЯ ВЕРСИЯ */
.product-image {
    width: 750px;
    height: 550px;
    margin: 0 auto 25px;
    position: relative;
    border-radius: 35px;
    overflow: hidden;
    background: #0d1f0d;
}

.slides-container {
    width: 100%;
    height: 100%;
    position: relative;
}





            

            h1 {
                font-size: 32px;
                margin-bottom: 10px;
                color: #ffffff;
                text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            }

            .price {
                font-size: 40px;
                font-weight: bold;
                color: #2d8c4e;
                margin: 15px 0;
                text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            }

            .description {
                color: #e0e0e0;
                margin: 15px 0;
                line-height: 1.6;
            }

            .exclusions-section {
                background: rgba(0,0,0,0.6);
                backdrop-filter: blur(10px);
                border-radius: 20px;
                padding: 20px;
                margin: 20px 0;
                text-align: left;
                border: 1px solid rgba(45,140,78,0.3);
            }

            .exclusions-section label {
                font-weight: bold;
                display: block;
                margin-bottom: 10px;
                color: #2d8c4e;
                font-size: 16px;
            }

            .exclusions-input {
                width: 100%;
                padding: 14px;
                border: 2px solid #2d8c4e;
                border-radius: 12px;
                font-size: 14px;
                font-family: inherit;
                resize: vertical;
                transition: border 0.2s;
                background: rgba(0,0,0,0.8);
                color: white;
            }

            .exclusions-input:focus {
                outline: none;
                border-color: #4ade80;
            }

            .exclusions-hint {
                font-size: 12px;
                color: #aaa;
                margin-top: 8px;
            }

            .section {
                margin: 30px 0;
                padding-top: 20px;
                border-top: 1px solid rgba(255,255,255,0.2);
            }

            .section h3 {
                font-size: 22px;
                color: #2d8c4e;
                margin-bottom: 20px;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .steps {
                display: flex;
                flex-wrap: wrap;
                gap: 15px;
                justify-content: space-between;
            }

            .step {
                flex: 1;
                min-width: 150px;
                background: rgba(0,0,0,0.6);
                backdrop-filter: blur(10px);
                padding: 15px;
                border-radius: 15px;
                text-align: center;
                border: 1px solid rgba(45,140,78,0.3);
            }

            .step-number {
                width: 40px;
                height: 40px;
                background: #2d8c4e;
                color: white;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                font-weight: bold;
                margin: 0 auto 10px;
            }

            .step-title {
                font-weight: bold;
                margin-bottom: 5px;
                color: white;
            }

            .step-desc {
                font-size: 12px;
                color: #ccc;
            }

            .size-table {
                width: 100%;
                border-collapse: collapse;
                background: rgba(0,0,0,0.6);
                backdrop-filter: blur(10px);
                border-radius: 15px;
                overflow: hidden;
                border: 1px solid rgba(45,140,78,0.3);
            }

            .size-table th, .size-table td {
                padding: 12px;
                text-align: center;
                border-bottom: 1px solid rgba(255,255,255,0.2);
                color: white;
            }

            .size-table th {
                background: #2d8c4e;
                color: white;
                font-weight: bold;
            }

            .size-table tr:last-child td {
                border-bottom: none;
            }

            .size-selector {
                margin: 20px 0 15px;
                text-align: left;
            }

            .size-selector label {
                font-weight: bold;
                display: block;
                margin-bottom: 10px;
                color: white;
            }

            .size-buttons {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                margin-bottom: 20px;
            }

            .size-btn {
                background: rgba(0,0,0,0.7);
                color: white;
                border: 1px solid #2d8c4e;
                padding: 12px 20px;
                font-size: 14px;
                border-radius: 12px;
                cursor: pointer;
                transition: all 0.2s;
                flex: 1;
                min-width: 100px;
            }

            .size-btn.selected {
                background: #2d8c4e;
                color: white;
            }

            .size-btn:hover {
                background: #2d8c4e;
                color: white;
                transform: scale(1.02);
            }

            .add-to-cart {
                background: #2d8c4e;
                width: 100%;
                font-size: 18px;
                padding: 15px;
                border: none;
                border-radius: 12px;
                color: white;
                cursor: pointer;
                transition: all 0.2s;
                margin-bottom: 20px;
                font-weight: bold;
            }

            .add-to-cart:hover {
                transform: scale(0.98);
                filter: brightness(1.05);
            }

                    .toast {
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%) translateY(100px);
                background: #2d8c4e;
                color: white;
                padding: 15px 30px;
                border-radius: 60px;
                font-size: 18px;
                font-weight: bold;
                z-index: 10000;
                opacity: 0;
                transition: all 0.3s ease;
                box-shadow: 0 5px 30px rgba(0,0,0,0.3);
                pointer-events: none;
                white-space: nowrap;
                text-align: center;
                min-width: 250px;
            }

            .toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            @media (max-width: 600px) {
                .toast {
                    font-size: 14px;
                    padding: 12px 20px;
                    white-space: normal;
                    min-width: 200px;
                }
            }

            .cart-modal {
                display: none;
                position: fixed;
                top: 0;
                right: 0;
                width: 380px;
                height: 100%;
                background: #0d1f0d;
                box-shadow: -5px 0 30px rgba(0,0,0,0.5);
                z-index: 1001;
                padding: 20px;
                overflow-y: auto;
            }

            .cart-modal.open {
                display: block;
                animation: slideIn 0.3s ease;
            }

            @keyframes slideIn {
                from { transform: translateX(100%); }
                to { transform: translateX(0); }
            }

            .cart-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 20px;
                padding-bottom: 10px;
                border-bottom: 1px solid rgba(45,140,78,0.5);
            }

            .cart-header h2 {
                font-size: 24px;
                color: white;
            }

            .clear-cart {
                background: #ff4444;
                padding: 8px 15px;
                font-size: 14px;
                border: none;
                border-radius: 8px;
                color: white;
                cursor: pointer;
            }

            .clear-cart:hover {
                background: #cc0000;
            }

            .cart-items {
                margin-bottom: 20px;
                max-height: 500px;
                overflow-y: auto;
            }

            .cart-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 12px 0;
                border-bottom: 1px solid rgba(255,255,255,0.1);
            }
            .cart-item span {
                color: white;
                font-weight: bold;
                min-width: 30px;
                text-align: center;
            }

            .item-info {
                flex: 1;
            }

            .item-name {
                font-weight: bold;
                margin-bottom: 5px;
                color: white;
            }

            .item-size {
                font-size: 12px;
                color: #ccc;
            }

            .item-exclude {
                font-size: 11px;
                color: #ff8888;
                margin-top: 3px;
            }

            .item-price {
                font-weight: bold;
                color: #2d8c4e;
            }

            .item-actions {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .quantity-btn {
                background: rgba(255,255,255,0.2);
                border: none;
                padding: 5px 10px;
                border-radius: 5px;
                cursor: pointer;
                color: white;
            }

            .remove-item {
                background: #ff4444;
                color: white;
                border: none;
                padding: 5px 10px;
                border-radius: 5px;
                cursor: pointer;
            }

            .cart-total {
                font-size: 24px;
                font-weight: bold;
                text-align: right;
                margin: 20px 0;
                padding-top: 20px;
                border-top: 1px solid rgba(45,140,78,0.5);
                color: white;
            }

            .checkout-btn {
                background: #2d8c4e;
                width: 100%;
                font-size: 18px;
                padding: 15px;
                border: none;
                border-radius: 12px;
                color: white;
                cursor: pointer;
            }

            .checkout-btn:hover {
                background: #1a5f3a;
            }

            .payment-modal {
                display: none;
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: #0d1f0d;
                padding: 20px;
                border-radius: 30px;
                z-index: 1002;
                text-align: center;
                max-width: 400px;
                width: 90%;
                box-shadow: 0 20px 60px rgba(0,0,0,0.5);
                animation: zoomIn 0.3s ease;
                border: 1px solid #2d8c4e;
                max-height: 90vh;
                overflow-y: auto;
            }

            @keyframes zoomIn {
                from {
                    opacity: 0;
                    transform: translate(-50%, -50%) scale(0.8);
                }
                to {
                    opacity: 1;
                    transform: translate(-50%, -50%) scale(1);
                }
            }

            .payment-modal.open {
                display: block;
            }

            .payment-modal h2 {
                margin-bottom: 20px;
                color: white;
            }

            .payment-amount {
                font-size: 32px;
                font-weight: bold;
                color: #2d8c4e;
                margin: 20px 0;
            }

            .qr-container {
                background: white;
                padding: 20px;
                border-radius: 20px;
                margin: 20px 0;
                border: 2px solid #2d8c4e;
            }

            .demo-qr {
                width: 200px;
                height: 200px;
                margin: 0 auto;
                background: repeating-linear-gradient(45deg, #000, #000 10px, #fff 10px, #fff 20px);
                border-radius: 15px;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
                overflow: hidden;
            }

            .demo-qr::before {
                content: "📱";
                font-size: 60px;
                position: absolute;
                background: white;
                padding: 10px;
                border-radius: 10px;
            }

            .payment-note {
                background: rgba(0,0,0,0.5);
                padding: 15px;
                border-radius: 15px;
                margin: 20px 0;
                font-size: 13px;
                color: #ccc;
            }

            .close-payment {
                background: #2d8c4e;
                padding: 12px 25px;
                margin-top: 10px;
                border: none;
                border-radius: 12px;
                color: white;
                cursor: pointer;
            }

            .overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.7);
                z-index: 1000;
            }

            .overlay.open {
                display: block;
            }

                    /* Адаптация для мобильных устройств */
            @media (max-width: 800px) {
                .product-image {
                    width: 100%;
                    height: auto;
                    max-width: 500px;
                    aspect-ratio: 1 / 1;
                    margin: 0 auto;
                }
            }
            
            @media (max-width: 600px) {
                .product-card {
                    margin: 60px 10px 0;

                /* Корзина на весь экран */

                .cart-modal.open {
                    width: 100%;

                .size-buttons {
                    flex-direction: column;
                }
                
                .steps {
                    flex-direction: column;
                }
                
                .payment-modal {
                    padding: 25px;

                }
                
                /* Таблица размеров на телефоне */
                .size-table th, .size-table td {
                    padding: 8px 4px;
                    font-size: 11px;
                }
                
                /* Фото товара */
                .product-image {
                    width: 100%;
                    height: auto;
                    max-width: 350px;
                    aspect-ratio: 1 / 1;

                }
                
                /* Элементы корзины - перенос */
                .cart-item {
                    flex-wrap: wrap;
                    gap: 8px;
                }
                
                .item-info {
                    width: 100%;
                    margin-bottom: 8px;
                }
                
                .item-actions {
                    width: 100%;
                    justify-content: flex-start;
                }
                
                /* Уведомление о доставке */
                .delivery-note {
                    font-size: 11px;
                }
                
                .delivery-note br {
                    display: none;
                }
            }
